<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Live call</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: #0f1115; color: #e7ecf3; display: flex; flex-direction: column; height: 100vh; }
    header { background: #1a1d24; padding: 12px 16px; border-bottom: 1px solid #2a2f3a; display: flex; justify-content: space-between; align-items: center; }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header .status { font-size: 12px; color: #8a93a6; }
    header .status.live { color: #4ade80; }
    #transcript { flex: 1; overflow-y: auto; padding: 16px; }
    .msg { margin: 8px 0; padding: 10px 14px; border-radius: 12px; max-width: 78%; line-height: 1.4; word-wrap: break-word; }
    .msg.user { background: #2563eb; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
    .msg.assistant { background: #1f2937; border: 1px solid #2a2f3a; border-bottom-left-radius: 4px; }
    .msg.system { background: #422006; color: #fbbf24; font-style: italic; margin: 8px auto; text-align: center; font-size: 13px; max-width: 90%; }
    .msg .role { font-size: 11px; color: #8a93a6; margin-bottom: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .msg.system.debug { font-size: 11px; opacity: 0.65; font-family: monospace; }
    .msg.system.debug-error { background: #4c1d1d; color: #fca5a5; }
    .partial { opacity: 0.55; font-style: italic; }
    footer { background: #1a1d24; padding: 10px; border-top: 1px solid #2a2f3a; display: flex; flex-direction: column; gap: 8px; }
    .input-row { display: flex; gap: 8px; }
    #inputBox { flex: 1; padding: 12px; background: #0f1115; border: 1px solid #2a2f3a; border-radius: 8px; color: #e7ecf3; font-size: 14px; resize: none; min-height: 44px; max-height: 120px; }
    .btn-row { display: flex; gap: 8px; }
    button { padding: 12px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; flex: 1; }
    button.say { background: #2563eb; color: white; }
    button.bg { background: #f59e0b; color: white; }
    button.hangup { background: #dc2626; color: white; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .feedback { font-size: 12px; color: #8a93a6; text-align: center; min-height: 16px; }
  </style>
</head>
<body>
  <header>
    <h1>Live call <span id="caller"></span></h1>
    <div style="display: flex; align-items: center; gap: 12px;">
      <label style="font-size: 11px; color: #8a93a6; display: flex; align-items: center; gap: 4px; cursor: pointer;">
        <input type="checkbox" id="toggleTools" style="margin: 0;"> Debug
      </label>
      <span class="status" id="status">Connecting...</span>
    </div>
  </header>

  <div id="transcript"></div>

  <footer>
    <textarea id="inputBox" placeholder="Scrivi qui..."></textarea>
    <div class="btn-row">
      <button class="say" id="btnSay">Fai dire all'assistente</button>
      <button class="bg" id="btnBg">Istruzione silenziosa</button>
    </div>
    <div class="btn-row">
      <button class="hangup" id="btnHangup">Riaggancia</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </footer>

<script>
  // La pagina e' servita dal deployment UI (login Google). Le fetch interne
  // vanno sul deployment API e si autenticano col token UI a vita breve
  // iniettato server-side: niente token master nel browser.
  const CALL_ID = '<?= callId ?>';
  const UITOK = '<?= uiToken ?>';
  const API = '<?= apiUrl ?>';

  const $ = id => document.getElementById(id);
  const transcript = $('transcript');
  const localNotes = [];
  let currentConv = [];
  let lastHash = '';
  let pollingActive = true;

  function escape(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function addSystemNote(text, kind) {
    localNotes.push({ text: text, time: Date.now(), kind: kind || 'note' });
    rerender();
  }

  function rerender() {
  transcript.innerHTML = '';
  const showTools = $('toggleTools') && $('toggleTools').checked;

  for (const m of currentConv) {
    const roleRaw = (m.role || '').toLowerCase();
    if (roleRaw === 'system') continue;

    const isToolMsg = roleRaw === 'tool' || roleRaw === 'function';
    const hasToolCalls = (m.toolCalls && m.toolCalls.length) || (m.tool_calls && m.tool_calls.length);
    const isToolish = isToolMsg || hasToolCalls;

    if (isToolish && !showTools) continue;

    if (isToolish) {
      const el = document.createElement('div');
      el.className = 'msg system';
      const name = (m.name) ||
                   (m.toolCalls && m.toolCalls[0] && m.toolCalls[0].function && m.toolCalls[0].function.name) ||
                   (m.tool_calls && m.tool_calls[0] && m.tool_calls[0].function && m.tool_calls[0].function.name) ||
                   'tool';
      const args = (m.toolCalls && m.toolCalls[0] && m.toolCalls[0].function && m.toolCalls[0].function.arguments) ||
                   (m.tool_calls && m.tool_calls[0] && m.tool_calls[0].function && m.tool_calls[0].function.arguments) ||
                   '';
      const result = m.message || m.content || m.result || '';
      el.innerHTML = '<b>' + escape(name) + '</b>' +
                     (args ? '<br><small>args: ' + escape(typeof args === 'string' ? args : JSON.stringify(args)) + '</small>' : '') +
                     (result ? '<br><small>→ ' + escape(typeof result === 'string' ? result.substring(0, 300) : JSON.stringify(result).substring(0, 300)) + '</small>' : '');
      transcript.appendChild(el);
      continue;
    }

    const role = roleRaw === 'user' ? 'user' : 'assistant';
    const text = m.message || m.content || m.text || '';
    if (!text) continue;
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    el.innerHTML = '<div class="role">' + (role === 'user' ? 'Chiamante' : 'Assistente') + '</div>' + escape(text);
    transcript.appendChild(el);
  }

  const showDebug = $('toggleTools') && $('toggleTools').checked;
  for (const n of localNotes) {
    if (n.kind === 'debug' && !showDebug) continue;
    const el = document.createElement('div');
    el.className = 'msg system' + (n.kind === 'debug' ? ' debug' : n.kind === 'debug-error' ? ' debug debug-error' : '');
    el.textContent = n.text;
    transcript.appendChild(el);
  }
  transcript.scrollTop = transcript.scrollHeight;
}
  async function pollTranscript() {
    if (!pollingActive) return;
    try {
      const url = API + '?action=get_transcript&callId=' + encodeURIComponent(CALL_ID) +
                  '&uitok=' + encodeURIComponent(UITOK);
      const res = await fetch(url);
      const j = await res.json();
      const conv = j.conversation || [];
      const last = conv[conv.length - 1] || {};
      const lastText = last.message || last.content || last.text || '';
      const hash = conv.length + ':' + lastText.length;
      if (hash !== lastHash) {
        currentConv = conv;
        lastHash = hash;
        rerender();
      }
    } catch (e) { console.error('Poll error:', e); }
  }

async function postAction(action, payload) {
    $('feedback').textContent = 'Invio ' + action + '...';
    try {
      const res = await fetch(API + '?action=' + action, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(Object.assign({ callId: CALL_ID, uitok: UITOK }, payload))
      });
      const text = await res.text();
      let j;
      try { j = JSON.parse(text); } catch (e) { j = { ok: false, raw: text.substring(0, 500) }; }
      if (j.ok) {
        $('feedback').textContent = action + ': OK';
        addSystemNote('DEBUG ' + action + ' → ' + JSON.stringify(j), 'debug');
      } else {
        $('feedback').textContent = action + ': ERRORE (vedi nota)';
        addSystemNote('ERRORE ' + action + ' → ' + JSON.stringify(j), 'debug-error');
      }
    } catch (e) {
      $('feedback').textContent = 'Errore: ' + e;
      addSystemNote('ERRORE ' + action + ' → exception: ' + e, 'debug-error');
    }
    setTimeout(() => $('feedback').textContent = '', 5000);
  }

  document.addEventListener('change', (e) => {
    if (e.target && e.target.id === 'toggleTools') rerender();
  });

  // Bootstrap
  (async () => {
    try {
      const res = await fetch(API + '?action=get_monitor&callId=' + encodeURIComponent(CALL_ID) +
                              '&uitok=' + encodeURIComponent(UITOK));
      const j = await res.json();
      if (j.callerNumber) $('caller').textContent = '— ' + j.callerNumber;
      if (j.status === 'ended') {
        $('status').textContent = 'Chiamata terminata';
        ['btnSay', 'btnBg', 'btnHangup'].forEach(id => $(id).disabled = true);
        pollingActive = false;
      } else {
        $('status').textContent = 'LIVE';
        $('status').classList.add('live');
      }
    } catch (e) { console.error(e); }
    pollTranscript();
    setInterval(pollTranscript, 1500);
  })();

  $('btnSay').onclick = () => {
    const t = $('inputBox').value.trim();
    if (!t) return;
    addSystemNote('Operatore → Assistente dirà: "' + t + '"');
    postAction('send_say', { message: t });
    $('inputBox').value = '';
  };

  $('btnBg').onclick = () => {
    const t = $('inputBox').value.trim();
    if (!t) return;
    addSystemNote('Operatore → Istruzione silenziosa: "' + t + '"');
    postAction('send_background', { content: t });
    $('inputBox').value = '';
  };

  $('btnHangup').onclick = () => {
    if (!confirm('Riagganciare la chiamata?')) return;
    postAction('hangup', {});
    pollingActive = false;
    setTimeout(() => {
      $('status').textContent = 'Chiamata terminata';
      ['btnSay', 'btnBg', 'btnHangup'].forEach(id => $(id).disabled = true);
    }, 500);
  };
</script>
</body>
</html>
